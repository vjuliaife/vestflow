# Continuous Integration workflow for VestFlow
# Runs tests and builds for all components when PRs are created

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  # Frontend and main application
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build generated contract bindings
        run: npm run bindings:build

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: .next/
          retention-days: 1

  # Indexer service
  indexer:
    name: Indexer Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: indexer/package-lock.json

      - name: Install dependencies
        run: |
          cd indexer
          npm ci

      - name: Build indexer
        run: |
          cd indexer
          npm run build

      - name: Run indexer pagination test
        run: |
          cd indexer
          npm run test:pagination

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: indexer-build
          path: indexer/dist/
          retention-days: 1

  # Smart contracts
  contracts:
    name: Contracts Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32v1-none
          components: clippy, rustfmt

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --version 26.0.0

      - name: Check formatting
        run: |
          cd contracts
          cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cd contracts
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: |
          cd contracts
          cargo test --verbose

      - name: Generate Rust coverage
        run: |
          cd contracts
          cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: contracts/lcov.info
          flags: rust-contracts
          name: vestflow-rust-contracts
          fail_ci_if_error: false

      - name: Build contracts
        run: |
          cd contracts
          cargo build --release --target wasm32v1-none

      - name: Report contract size and storage metrics
        run: npm run contracts:metrics

      - name: Verify generated TypeScript bindings are current
        run: |
          npm run bindings:generate
          git diff --exit-code -- lib/bindings/vestflow

      - name: Upload contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: contracts/target/wasm32v1-none/release/*.wasm
          retention-days: 7

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit (main)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run npm audit (indexer)
        run: |
          cd indexer
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: |
          cd contracts
          cargo audit
        continue-on-error: true

  # Dependency check summary
  dependency-check:
    name: Dependency Check Summary
    runs-on: ubuntu-latest
    needs: [frontend, indexer, contracts, security]
    if: always()
    
    steps:
      - name: Check job results
        run: |
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Indexer: ${{ needs.indexer.result }}"
          echo "Contracts: ${{ needs.contracts.result }}"
          echo "Security: ${{ needs.security.result }}"
          
          if [[ "${{ needs.frontend.result }}" != "success" ]] || \
             [[ "${{ needs.indexer.result }}" != "success" ]] || \
             [[ "${{ needs.contracts.result }}" != "success" ]]; then
            echo "❌ One or more builds failed"
            exit 1
          else
            echo "✅ All builds successful"
          fi
